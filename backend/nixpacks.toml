[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[variables]
NIXPACKS_PHP_EXTENSIONS = "pdo_pgsql,pgsql"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan optimize:clear || true"]

[start]
cmd = "php artisan optimize:clear; php artisan storage:link || true; php artisan migrate --force; php artisan serve --host=0.0.0.0 --port=$PORT"
