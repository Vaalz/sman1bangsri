services:
  - type: web
    name: web-smansaba-backend
    runtime: php
    rootDir: backend
    plan: free
    buildCommand: |
      composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
      php artisan config:clear
      php artisan route:clear
      php artisan view:clear
    startCommand: |
      php artisan storage:link || true
      php artisan migrate --force
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
